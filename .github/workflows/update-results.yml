name: Sync World Cup 2026 Results

on:
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required to commit changes back to the repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Update Script
        run: node update_results.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes in match scores."
          else
            git commit -m "Auto-update World Cup 2026 scores & match results [skip ci]"
            git push origin main || git push origin master
          fi
